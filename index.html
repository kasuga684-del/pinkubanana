<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ピンクバナナ 面接予約フォーム</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary-color: #ff69b4;
      --bg-color: #fff0f5;
      --text-color: #333333;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.15);
    }
    h1 {
      text-align: center;
      color: var(--primary-color);
      font-size: 20px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .required {
      color: white;
      background-color: var(--primary-color);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 5px;
      vertical-align: middle;
    }
    .optional {
      color: #666;
      background-color: #eee;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 5px;
      vertical-align: middle;
    }
    input[type="text"], input[type="number"], input[type="date"], select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
      background-color: #fafafa;
      font-family: inherit;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      background-color: #fff;
    }
    .datetime-group {
      display: flex;
      gap: 10px;
    }
    .datetime-group input, .datetime-group select {
      flex: 1;
    }
    .submit-btn {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }
    .submit-btn:disabled {
      background-color: #cccccc;
    }
    .loader {
      display: none;
      text-align: center;
      margin-top: 15px;
      color: var(--primary-color);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎀 ピンクバナナ 面接予約 🎀</h1>
    <form id="recruitForm">
      <input type="hidden" id="userId" name="userId" value="">

      <div class="form-group">
        <label>お名前（偽名でも可）<span class="required">必須</span></label>
        <input type="text" name="name" required placeholder="例：さくら">
      </div>

      <div class="form-group">
        <label>ご年齢<span class="required">必須</span></label>
        <select name="age" required>
          <option value="" disabled selected>選択してください</option>
          <option value="18">18</option><option value="19">19</option><option value="20">20</option>
          <option value="21">21</option><option value="22">22</option><option value="23">23</option>
          <option value="24">24</option><option value="25">25</option><option value="26">26</option>
          <option value="27">27</option><option value="28">28</option><option value="29">29</option>
          <option value="30">30</option><option value="31">31</option><option value="32">32</option>
          <option value="33">33</option><option value="34">34</option><option value="35">35</option>
          <option value="36">36</option><option value="37">37</option><option value="38">38</option>
          <option value="39">39</option><option value="40">40</option>
        </select>
      </div>

      <div class="form-group">
        <label>第1希望日時<span class="required">必須</span></label>
        <div class="datetime-group">
          <input type="date" name="date1" required>
          <select name="time1" required>
            <option value="" disabled selected>--:--</option>
            <option value="10:00">10:00</option><option value="10:30">10:30</option>
            <option value="11:00">11:00</option><option value="11:30">11:30</option>
            <option value="12:00">12:00</option><option value="12:30">12:30</option>
            <option value="13:00">13:00</option><option value="13:30">13:30</option>
            <option value="14:00">14:00</option><option value="14:30">14:30</option>
            <option value="15:00">15:00</option><option value="15:30">15:30</option>
            <option value="16:00">16:00</option><option value="16:30">16:30</option>
            <option value="17:00">17:00</option><option value="17:30">17:30</option>
            <option value="18:00">18:00</option><option value="18:30">18:30</option>
            <option value="19:00">19:00</option><option value="19:30">19:30</option>
            <option value="20:00">20:00</option><option value="20:30">20:30</option>
            <option value="21:00">21:00</option><option value="21:30">21:30</option>
            <option value="22:00">22:00</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>第2希望日時<span class="required">必須</span></label>
        <div class="datetime-group">
          <input type="date" name="date2" required>
          <select name="time2" required>
            <option value="" disabled selected>--:--</option>
            <option value="10:00">10:00</option><option value="10:30">10:30</option>
            <option value="11:00">11:00</option><option value="11:30">11:30</option>
            <option value="12:00">12:00</option><option value="12:30">12:30</option>
            <option value="13:00">13:00</option><option value="13:30">13:30</option>
            <option value="14:00">14:00</option><option value="14:30">14:30</option>
            <option value="15:00">15:00</option><option value="15:30">15:30</option>
            <option value="16:00">16:00</option><option value="16:30">16:30</option>
            <option value="17:00">17:00</option><option value="17:30">17:30</option>
            <option value="18:00">18:00</option><option value="18:30">18:30</option>
            <option value="19:00">19:00</option><option value="19:30">19:30</option>
            <option value="20:00">20:00</option><option value="20:30">20:30</option>
            <option value="21:00">21:00</option><option value="21:30">21:30</option>
            <option value="22:00">22:00</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>体験入店のご希望<span class="required">必須</span></label>
        <select name="experience" required>
          <option value="" disabled selected>選択してください</option>
          <option value="面接後にそのまま体験したい">面接後にそのまま体験したい</option>
          <option value="面接だけしたい（体験は後日）">面接だけしたい（体験は後日）</option>
          <option value="話を聞いてから決めたい">話を聞いてから決めたい</option>
        </select>
      </div>

      <div class="form-group">
        <label>ご質問や気になること<span class="optional">任意</span></label>
        <textarea name="questions" placeholder="面接前の不安なことや、ご質問などがあればご自由にお書きください。"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">この内容で応募する</button>
      <div class="loader" id="loader">送信中...少々お待ちください✨</div>
    </form>
  </div>

  <script>
    // LIFF IDとGASのURLを完全に組み込み済みです
    const LIFF_ID = "2009676389-imnmD2KJ"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxv_5UDn2yyGAzAWf0LlkoPMXEMjc61wVSH4fKdQTkUmSWywoZOr1EDvcLz-7eAHcSFag/exec";

    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          document.getElementById('userId').value = profile.userId;
        } else {
          liff.login();
        }
      } catch (err) {
        console.error('LIFF Initialization failed', err);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      initializeLiff();
    });

    document.getElementById('recruitForm').addEventListener('submit', function(e) {
      e.preventDefault(); 

      const btn = document.getElementById('submitBtn');
      const loader = document.getElementById('loader');
      
      btn.disabled = true;
      btn.style.backgroundColor = '#ccc';
      loader.style.display = 'block';

      const formData = new FormData(this);
      const params = new URLSearchParams();
      for (const pair of formData.entries()) {
        params.append(pair[0], pair[1]);
      }

      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: params.toString()
      })
      .then(response => response.text())
      .then(data => {
        alert("ご応募ありがとうございます！LINEのトーク画面に戻り、メッセージをご確認ください。");
        if (liff.isInClient()) {
          liff.closeWindow(); 
        } else {
          btn.disabled = false;
          btn.style.backgroundColor = '#ff69b4';
          loader.style.display = 'none';
          document.getElementById('recruitForm').reset();
        }
      })
      .catch(error => {
        alert("通信エラーが発生しました。お手数ですが時間をおいて再度お試しください。");
        btn.disabled = false;
        btn.style.backgroundColor = '#ff69b4';
        loader.style.display = 'none';
      });
    });
  </script>
</body>
</html>
